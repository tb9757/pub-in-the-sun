<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pub in the Sun</title>

    <!-- Leaflet CSS - the map styling -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Google Fonts - Playfair Display for headings, Source Sans for body -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@400;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header>
        <h1>🍺 Pub in the Sun</h1>
        <p class="tagline">Find a sunny pint near you</p>
    </header>

    <!-- Status message shown while loading -->
    <div id="status">Finding your location...</div>

    <!-- The map -->
    <div id="map"></div>

    <!-- Search this area button -->
    <button id="search-btn" onclick="searchArea()">🔍 Search this area</button>

    <!-- Panel that slides up when you tap a pub marker -->
    <div id="verdict-panel" class="hidden">
        <div id="verdict-header">
            <h2 id="pub-name"></h2>
            <p id="pub-address"></p>
        </div>
        <div id="verdict-body">
            <p id="verdict-text">Getting verdict...</p>
        </div>
        <div id="forecast-section">
            <p class="forecast-label">Next few hours</p>
            <div id="forecast-bars"></div>
        </div>
        <!-- User Report Section -->
        <div id="report-section">
            <div id="question-1">
                <p class="report-question">Are you at this pub right now?</p>
                <div class="report-buttons">
                    <button class="report-btn yes-btn" onclick="showQuestion2()">Yes</button>
                    <button class="report-btn no-btn" onclick="hideReport()">No</button>
                </div>
            </div>

            <div id="question-2" class="hidden">
                <p class="report-question">Is the beer garden sunny right now?</p>
                <div class="report-buttons">
                    <button class="report-btn yes-btn" onclick="setSunny(true)">Yes ☀️</button>
                    <button class="report-btn no-btn" onclick="setSunny(false)">No ☁️</button>
                </div>
            </div>

            <div id="question-3" class="hidden">
                <p class="report-question">Is the garden at the front or back of the pub?</p>
                <div class="report-buttons">
                    <button class="report-btn" onclick="setGarden('front')">Front</button>
                    <button class="report-btn" onclick="setGarden('back')">Back</button>
                    <button class="report-btn" onclick="setGarden('unknown')">Not sure</button>
                </div>
            </div>

            <div id="report-thanks" class="hidden">
                <p class="report-question">Thanks for your report! 🍺</p>
            </div>
        </div>
        <button id="close-btn" onclick="closePanel()">Close</button>
    </div>

    <!-- Leaflet JS - the map library -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- SunCalc JS - sun position calculations -->
    <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>

    <!-- Our app logic -->
    <script src="app.js"></script>

</body>

</html>
